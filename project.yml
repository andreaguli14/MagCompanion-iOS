name: MagCompanion
options:
  bundleIdPrefix: com.indoornav
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"

targets:
  MagCompanion:
    type: application
    platform: iOS
    sources:
      - path: MagCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.indoornav.magcompanion
        SWIFT_VERSION: "5.9"
        ENABLE_BITCODE: NO
        TARGETED_DEVICE_FAMILY: "1"        # iPhone only
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        INFOPLIST_FILE: MagCompanion/Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
