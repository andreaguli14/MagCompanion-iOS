name: MagCompanion
options:
  bundleIdPrefix: com.indoornav
  deploymentTarget:
    iOS: "16.0"

targets:
  MagCompanion:
    type: application
    platform: iOS
    sources:
      - path: MagCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.indoornav.magcompanion
        SWIFT_VERSION: "5.9"
        ENABLE_BITCODE: NO
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        INFOPLIST_FILE: MagCompanion/Info.plist
