name: Build MagCompanion IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Genera progetto Xcode
        run: xcodegen generate

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -scheme MagCompanion \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/MagCompanion.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      - name: Crea IPA dall'archivio
        run: |
          mkdir -p build/Payload
          cp -r "build/MagCompanion.xcarchive/Products/Applications/MagCompanion.app" build/Payload/
          cd build && zip -r MagCompanion.ipa Payload/
          echo "IPA: $(du -sh MagCompanion.ipa)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagCompanion-IPA
          path: build/MagCompanion.ipa
          retention-days: 30
