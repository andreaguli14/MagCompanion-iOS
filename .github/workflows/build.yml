name: Build MagCompanion IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Genera progetto Xcode
        run: xcodegen generate

      - name: Build unsigned
        run: |
          xcodebuild \
            -scheme MagCompanion \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$PWD/build/derived" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            build

      - name: Debug output
        run: |
          echo "=== Prodotti build ==="
          find build/derived/Build/Products -maxdepth 4 2>/dev/null | head -40 || echo "(vuoto)"
          echo "=== Binary check ==="
          APP="build/derived/Build/Products/Release-iphoneos/MagCompanion.app"
          file "$APP/MagCompanion" 2>&1 || echo "BINARY NON TROVATO al path standard"
          echo "=== Info.plist nel .app ==="
          cat "$APP/Info.plist" 2>&1 || echo "PLIST NON TROVATO"

      - name: Crea IPA
        run: |
          APP=$(find build/derived/Build/Products -name "MagCompanion.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p build/Payload
          cp -r "$APP" build/Payload/MagCompanion.app
          cd build && zip -r MagCompanion.ipa Payload/
          echo "IPA: $(du -sh MagCompanion.ipa)"
          echo "=== Contenuto IPA ==="
          unzip -l MagCompanion.ipa | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagCompanion-IPA
          path: build/MagCompanion.ipa
          retention-days: 30
