name: Build MagCompanion IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Genera progetto Xcode
        run: xcodegen generate

      - name: Crea certificato self-signed temporaneo
        run: |
          cat > /tmp/cert.conf << 'EOF'
          [req]
          distinguished_name = req_dn
          x509_extensions = v3_req
          prompt = no
          [req_dn]
          CN = iPhone Developer
          [v3_req]
          keyUsage = critical, digitalSignature
          extendedKeyUsage = critical, codeSigning
          basicConstraints = critical, CA:false
          EOF

          openssl req -x509 -newkey rsa:2048 \
            -keyout /tmp/key.pem -out /tmp/cert.pem \
            -days 1 -nodes -config /tmp/cert.conf

          openssl pkcs12 -export \
            -out /tmp/cert.p12 \
            -inkey /tmp/key.pem -in /tmp/cert.pem \
            -passout pass:temp123

          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "temp123" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "temp123" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 -P temp123 -A -f pkcs12 -k "$KEYCHAIN_PATH"
          security add-trusted-cert -d -r trustRoot -p codeSign -k "$KEYCHAIN_PATH" /tmp/cert.pem
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "Identità disponibili:"
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Build
        run: |
          xcodebuild \
            -scheme MagCompanion \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$PWD/build/derived" \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_BITCODE=NO \
            build

      - name: Crea IPA
        run: |
          APP=$(find build/derived/Build/Products -name "MagCompanion.app" -type d | head -1)
          echo "App: $APP"
          ls -la "$APP/"

          if [ ! -f "$APP/MagCompanion" ]; then
            echo "ERROR: binary non trovato, cerco ovunque..."
            find build/derived -name "MagCompanion" -type f 2>/dev/null | head -10
            exit 1
          fi

          echo "Binary: $(file "$APP/MagCompanion")"

          # Sostituisce Info.plist con il sorgente noto-buono
          cp MagCompanion/Info.plist "$APP/Info.plist"

          mkdir -p build/Payload
          cp -r "$APP" build/Payload/MagCompanion.app

          cd build
          ditto -c -k --sequesterRsrc --keepParent Payload MagCompanion.ipa
          echo "IPA: $(du -sh MagCompanion.ipa)"
          unzip -l MagCompanion.ipa | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagCompanion-IPA
          path: build/MagCompanion.ipa
          retention-days: 30
