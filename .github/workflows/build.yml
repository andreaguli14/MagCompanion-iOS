name: Build MagCompanion IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Genera progetto Xcode
        run: xcodegen generate

      - name: Archive (ad-hoc sign per ottenere il binary)
        run: |
          xcodebuild archive \
            -scheme MagCompanion \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/MagCompanion.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            SKIP_INSTALL=NO \
            ENABLE_BITCODE=NO

      - name: Debug contenuto archivio
        run: |
          echo "=== Struttura xcarchive ==="
          find build/MagCompanion.xcarchive -maxdepth 6 | head -40
          echo "=== Binary presente? ==="
          file build/MagCompanion.xcarchive/Products/Applications/MagCompanion.app/MagCompanion 2>&1 || echo "NON TROVATO al path standard"

      - name: Crea IPA dall'archivio
        run: |
          APP=$(find build/MagCompanion.xcarchive -name "*.app" -type d | head -1)
          echo "App trovata: $APP"
          mkdir -p build/Payload
          cp -r "$APP" build/Payload/
          cd build && zip -r MagCompanion.ipa Payload/
          echo "IPA: $(du -sh MagCompanion.ipa)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagCompanion-IPA
          path: build/MagCompanion.ipa
          retention-days: 30
