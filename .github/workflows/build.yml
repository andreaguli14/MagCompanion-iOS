name: Build MagCompanion IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Genera progetto Xcode
        run: xcodegen generate

      - name: Build unsigned
        run: |
          xcodebuild \
            -scheme MagCompanion \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build/app" \
            build

      - name: Crea IPA
        run: |
          mkdir -p build/Payload
          cp -r build/app/MagCompanion.app build/Payload/
          cd build && zip -r MagCompanion.ipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MagCompanion-IPA
          path: build/MagCompanion.ipa
          retention-days: 30
